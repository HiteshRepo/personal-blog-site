<section id="chat-section">
  <div class="br3 pa3 pa4-l" style="background:#f0f7ff; border: 1.5px solid #93c5fd; box-shadow: 0 2px 12px rgba(59,130,246,0.10);">
    <div class="flex items-center mb1">
      <span class="f3 mr2" aria-hidden="true">🤖</span>
      <h2 class="f4 fw7 mt0 mb0" style="color:#1d4ed8;">Ask me anything</h2>
      <span class="ml2 ph2 pv1 br-pill f7 fw6 white" style="background:#3b82f6; font-size:0.65rem; letter-spacing:.03em;">AI</span>
    </div>
    <p class="f6 mt1 mb3" style="color:#4b5563;">Ask about my posts, projects, tech stack, or experience — I'll find the answer.</p>

    <div
      id="chat-messages"
      class="bg-white pa3 br2 mb3 f6 lh-copy overflow-y-auto"
      style="min-height: 80px; max-height: 360px; border: 1px solid #e2e8f0;"
      aria-live="polite"
      aria-label="Chat messages"
    ></div>

    <div class="flex items-center">
      <input
        id="chat-input"
        type="text"
        placeholder="e.g. What projects use Kubernetes?"
        class="flex-auto pa2 br2 ba f6 mr2"
        style="border-color:#93c5fd; outline:none;"
        aria-label="Chat message input"
        autocomplete="off"
      />
      <button
        id="chat-send"
        class="pa2 ph3 bn br2 pointer f6 fw6 nowrap white"
        style="background:#3b82f6;"
        aria-label="Send message"
      >
        Send ↑
      </button>
    </div>
    <p id="chat-status" class="f7 mt2 mb0" style="color:#6b7280;" aria-live="polite"></p>
  </div>
</section>

<script>
  window.CHAT_PAGE_SLUG = {{ with .File }}{{ with .BaseFileName }}"{{ . }}"{{ end }}{{ end }};
</script>
<script src="/js/chat.js"></script>
