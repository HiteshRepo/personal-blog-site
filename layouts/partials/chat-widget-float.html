{{/* Floating chat widget. Accepts context dict: .Page, .questions (slice), .typeName (string) */}}

<button id="chat-float-toggle"
  style="position:fixed;bottom:1.5rem;right:1.5rem;z-index:1000;
         width:3.5rem;height:3.5rem;border-radius:50%;border:none;
         background:#3b82f6;color:white;font-size:1.5rem;
         cursor:pointer;box-shadow:0 4px 16px rgba(59,130,246,0.4);
         display:flex;align-items:center;justify-content:center;"
  aria-label="Open AI chat">
  🤖
</button>

<div id="chat-float-panel"
  style="position:fixed;bottom:6rem;right:1.5rem;width:360px;max-width:calc(100vw - 3rem);
         z-index:999;display:none;
         background:#f0f7ff;border:1.5px solid #93c5fd;border-radius:0.75rem;
         box-shadow:0 8px 32px rgba(59,130,246,0.15);">

  <div style="padding:1rem 1rem 0.5rem;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.25rem;">
      <div style="display:flex;align-items:center;gap:0.5rem;">
        <span style="font-size:1.1rem;" aria-hidden="true">🤖</span>
        <strong style="color:#1d4ed8;font-size:0.9rem;">Ask me anything</strong>
        <span style="background:#3b82f6;color:white;border-radius:9999px;padding:0.1rem 0.4rem;font-size:0.6rem;font-weight:600;">AI</span>
      </div>
      <button id="chat-float-close"
        style="background:none;border:none;cursor:pointer;color:#6b7280;font-size:1.1rem;line-height:1;"
        aria-label="Close chat">✕</button>
    </div>
    <p style="font-size:0.75rem;color:#4b5563;margin:0 0 0.75rem;">
      Ask about this {{ .typeName }}, my other projects, or experience.
    </p>

    {{ with .questions }}
    <div id="chat-suggestions" style="display:flex;flex-wrap:wrap;gap:0.4rem;margin-bottom:0.75rem;">
      {{ range . }}
      <button class="chat-suggestion"
        style="font-size:0.7rem;padding:0.25rem 0.6rem;border-radius:9999px;
               border:1px solid #93c5fd;background:white;color:#1d4ed8;cursor:pointer;">
        {{ . }}
      </button>
      {{ end }}
    </div>
    {{ end }}
  </div>

  <div id="chat-messages"
    style="min-height:60px;max-height:280px;overflow-y:auto;padding:0.75rem 1rem;
           background:white;border-top:1px solid #e2e8f0;border-bottom:1px solid #e2e8f0;"
    aria-live="polite" aria-label="Chat messages">
  </div>

  <div style="padding:0.75rem 1rem;">
    <div style="display:flex;gap:0.5rem;">
      <input id="chat-input" type="text"
        placeholder="Ask a question..."
        style="flex:1;padding:0.4rem 0.6rem;border-radius:0.4rem;border:1px solid #93c5fd;font-size:0.8rem;outline:none;"
        aria-label="Chat message" autocomplete="off" />
      <button id="chat-send"
        style="padding:0.4rem 0.75rem;background:#3b82f6;color:white;border:none;
               border-radius:0.4rem;cursor:pointer;font-size:0.8rem;font-weight:600;"
        aria-label="Send">&#8593;</button>
    </div>
    <p id="chat-status" style="font-size:0.7rem;color:#6b7280;margin:0.3rem 0 0;" aria-live="polite"></p>
  </div>
</div>

<script>
  window.CHAT_PAGE_SLUG = {{ with .Page.File }}"{{ .BaseFileName }}"{{ else }}null{{ end }};

  (function () {
    var toggle = document.getElementById("chat-float-toggle");
    var close  = document.getElementById("chat-float-close");
    var panel  = document.getElementById("chat-float-panel");

    function openPanel() {
      panel.style.display = "block";
      document.getElementById("chat-input").focus();
    }
    function closePanel() { panel.style.display = "none"; }

    toggle.addEventListener("click", function () {
      panel.style.display === "none" ? openPanel() : closePanel();
    });
    close.addEventListener("click", closePanel);

    // Suggested question chips
    var chips = document.querySelectorAll(".chat-suggestion");
    var suggestions = document.getElementById("chat-suggestions");
    chips.forEach(function (chip) {
      chip.addEventListener("click", function () {
        var input = document.getElementById("chat-input");
        input.value = chip.textContent.trim();
        if (suggestions) suggestions.style.display = "none";
        document.getElementById("chat-send").click();
      });
    });
  })();
</script>
<script src="/js/chat.js"></script>
